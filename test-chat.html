<!doctype html>
<html>
  <head>
    <title>ChatApp SignalR Test (Presence)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <style>
      body {
        font-family: Arial;
        padding: 20px;
      }
      #chatBox {
        border: 1px solid #ccc;
        padding: 10px;
        width: 600px;
        max-height: 400px;
        overflow-y: auto;
        background: #f9f9f9;
      }
      .msg {
        margin: 5px 0;
        padding: 5px;
        border-bottom: 1px dashed #eee;
      }
      .history {
        color: gray;
      }
      .realtime {
        color: blue;
        font-weight: bold;
      }
      .time {
        font-size: 0.8em;
        color: #888;
      }
      #loadMoreBtn {
        width: 100%;
        padding: 10px;
        margin-bottom: 10px;
        cursor: pointer;
        display: none;
        background: #e0e0e0;
        border: none;
      }

      /* --- CSS MỚI CHO ONLINE STATUS --- */
      .online-panel {
        border: 2px solid #4caf50;
        padding: 10px;
        margin-bottom: 15px;
        background: #eaffea;
        width: 600px;
        border-radius: 5px;
      }
      .dot {
        height: 12px;
        width: 12px;
        background-color: #4caf50;
        border-radius: 50%;
        display: inline-block;
        margin-right: 5px;
        box-shadow: 0 0 5px #4caf50;
      }
      .user-item {
        margin: 5px 0;
        font-family: monospace;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <h2>Test SignalR & Trạng thái Online/Offline</h2>

    <label>Access Token:</label><br />
    <textarea
      id="tokenInput"
      rows="3"
      cols="80"
      placeholder="Paste Access Token vào đây..."
    ></textarea
    ><br /><br />

    <button onclick="connect()">1. Kết nối SignalR</button>
    <button onclick="joinRoom()">2. Join Phòng Chat</button><br /><br />

    <div class="online-panel">
      <strong>🟢 Đang Online:</strong>
      <div id="onlineUsersList" style="margin-top: 10px; padding-left: 10px">
        <em>Chưa kết nối...</em>
      </div>
    </div>

    <label>Tin nhắn:</label><br />
    <input
      type="text"
      id="messageInput"
      size="50"
      placeholder="Nhập tin nhắn..."
      oninput="handleTyping()"
    />
    <button onclick="sendMessage()">3. Gửi tin nhắn</button>

    <hr />
    <h3>Khung Chat:</h3>
    <div
      id="typingIndicator"
      style="color: green; font-style: italic; font-size: 0.9em; height: 20px"
    ></div>
    <div id="chatBox">
      <button id="loadMoreBtn" onclick="loadMore()">
        Lấy thêm tin nhắn cũ ⬆️
      </button>
      <div id="messagesList"></div>
    </div>

    <script>
      let connection = null;
      const CONVERSATION_ID = "11111111-1111-1111-1111-111111111111"; // Thay bằng ID phòng chat thật nếu cần
      let oldestMessageTimestamp = null;
      let onlineUsers = new Set();
      let currentUserId = null; // Biến lưu ID của chính mình

      // --- HÀM GIẢI MÃ JWT ĐỂ LẤY USER ID ---
      function parseJwt(token) {
        try {
          const base64Url = token.split(".")[1];
          const base64 = base64Url.replace(/-/g, "+").replace(/_/g, "/");
          const jsonPayload = decodeURIComponent(
            window
              .atob(base64)
              .split("")
              .map(function (c) {
                return "%" + ("00" + c.charCodeAt(0).toString(16)).slice(-2);
              })
              .join(""),
          );
          const payload = JSON.parse(jsonPayload);
          // Trả về Claim nameidentifier (chứa User Id trong .NET)
          return payload[
            "http://schemas.xmlsoap.org/ws/2005/05/identity/claims/nameidentifier"
          ];
        } catch (e) {
          return null;
        }
      }

      function renderOnlineUsers() {
        // ... (Hàm này giữ nguyên như cũ của bạn) ...
        const list = document.getElementById("onlineUsersList");
        list.innerHTML = "";
        if (onlineUsers.size === 0) {
          list.innerHTML = "<em>Không có ai online...</em>";
          return;
        }
        onlineUsers.forEach((userId) => {
          const div = document.createElement("div");
          div.className = "user-item";
          div.innerHTML = `<span class="dot"></span> User ID: ${userId}`;
          list.appendChild(div);
        });
      }

      // --- DEBOUNCE TYPING ---
      let typingTimeout = null;
      let isTyping = false;
      function handleTyping() {
        if (!connection) return;
        if (!isTyping) {
          isTyping = true;
          connection
            .invoke("NotifyTyping", CONVERSATION_ID, true)
            .catch((err) => console.error(err));
        }
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
          isTyping = false;
          connection
            .invoke("NotifyTyping", CONVERSATION_ID, false)
            .catch((err) => console.error(err));
        }, 2000);
      }

      async function connect() {
        const token = document.getElementById("tokenInput").value;
        if (!token) {
          alert("Vui lòng nhập Token!");
          return;
        }

        // Lấy User ID từ Token
        currentUserId = parseJwt(token);
        console.log("My User ID:", currentUserId);

        connection = new signalR.HubConnectionBuilder()
          .withUrl(`http://localhost:5000/chatHub?access_token=${token}`)
          .withAutomaticReconnect()
          .build();

        // 1. Nhận danh sách Online
        connection.on("GetOnlineUsers", (users) => {
          onlineUsers = new Set(users);
          renderOnlineUsers();
        });
        connection.on("UserIsOnline", (userId) => {
          onlineUsers.add(userId);
          renderOnlineUsers();
        });
        connection.on("UserIsOffline", (userId) => {
          onlineUsers.delete(userId);
          renderOnlineUsers();
        });
        connection.on("UserTyping", (conversationId, userId, isUserTyping) => {
          if (conversationId === CONVERSATION_ID) {
            const indicator = document.getElementById("typingIndicator");
            indicator.innerText = isUserTyping
              ? `User ${userId.substring(0, 5)}... đang gõ... ✍️`
              : "";
          }
        });

        // =====================================
        // 2. NHẬN TIN NHẮN MỚI
        // =====================================
        connection.on("ReceiveMessage", async (apiResponse) => {
          const msg = apiResponse.data;
          const list = document.getElementById("messagesList");
          const div = document.createElement("div");
          div.className = "msg realtime";

          const timeStr = new Date(msg.createdAt).toLocaleTimeString();
          const isMyMsg = msg.senderId === currentUserId;
          const prefix = isMyMsg
            ? "[TÔI]"
            : `[User ${msg.senderId.substring(0, 5)}]`;

          div.innerHTML = `<strong>${prefix}</strong>: ${msg.content} <span class="time">(${timeStr})</span>`;
          // Tạo chỗ trống để hiện chữ Đã xem sau này (nếu là tin của mình)
          if (isMyMsg) {
            div.innerHTML += `<div class="read-receipt" style="font-size:0.75em; color:green; text-align:right;"></div>`;
          }
          list.appendChild(div);

          const chatBox = document.getElementById("chatBox");
          chatBox.scrollTop = chatBox.scrollHeight;

          // LOGIC ĐÃ XEM: Nếu tin nhắn mới không phải của mình -> Báo cho server là mình đã xem
          if (!isMyMsg) {
            await connection.invoke("MarkAsRead", CONVERSATION_ID);
          }
        });

        // =====================================
        // 3. LẮNG NGHE SỰ KIỆN CÓ NGƯỜI ĐÃ XEM TIN NHẮN
        // =====================================
        connection.on("UserHasReadMessages", (conversationId, userId) => {
          console.log(`User ${userId} đã xem tin nhắn!`);

          // Chuẩn hóa ID thành chữ thường để so sánh an toàn tuyệt đối
          if (
            String(conversationId).toLowerCase() ===
            String(CONVERSATION_ID).toLowerCase()
          ) {
            const shortUserId = userId.substring(0, 5); // Lấy 5 ký tự đầu của người xem
            const allMsgs = document.querySelectorAll(".msg");

            allMsgs.forEach((m) => {
              // Tìm những tin nhắn do chính mình gửi
              if (m.innerHTML.includes("[TÔI]")) {
                const receiptDiv = m.querySelector(".read-receipt");

                // Nếu tìm thấy khung chứa ReadReceipt VÀ khung đó chưa chứa ID của người xem
                if (receiptDiv && !receiptDiv.innerHTML.includes(shortUserId)) {
                  // Nhét chữ Đã xem vào
                  receiptDiv.innerHTML += `👀 Đã xem bởi ${shortUserId}... `;
                }
              }
            });
          }
        });

        try {
          await connection.start();
          alert("✅ KẾT NỐI SIGNALR THÀNH CÔNG!");
        } catch (err) {
          console.error(err);
          alert("❌ Kết nối thất bại, check console (F12)");
        }
      }

      async function joinRoom() {
        if (connection) {
          await connection.invoke("JoinConversation", CONVERSATION_ID);
          alert(`Đã join phòng: ${CONVERSATION_ID}`);
          await fetchHistory(false);

          // LOGIC ĐÃ XEM: Khi vừa vào phòng, lập tức báo đã xem hết tin cũ
          await connection.invoke("MarkAsRead", CONVERSATION_ID);
        }
      }

      async function sendMessage() {
        const content = document.getElementById("messageInput").value;
        if (connection && content) {
          await connection.invoke("SendMessage", CONVERSATION_ID, content);
          document.getElementById("messageInput").value = "";
          document.getElementById("typingIndicator").innerText = ""; // Xóa chữ đang gõ
        }
      }

      // =====================================
      // 4. HIỂN THỊ LỊCH SỬ KÈM "ĐÃ XEM"
      // =====================================
      async function fetchHistory(isLoadMore = false) {
        const token = document.getElementById("tokenInput").value;
        let url = `http://localhost:5000/api/conversations/${CONVERSATION_ID}/messages?limit=5`;
        if (isLoadMore && oldestMessageTimestamp)
          url += `&before=${encodeURIComponent(oldestMessageTimestamp)}`;

        try {
          const response = await fetch(url, {
            headers: { Authorization: `Bearer ${token}` },
          });
          const apiResponse = await response.json();

          if (apiResponse.success && apiResponse.data.length > 0) {
            const list = document.getElementById("messagesList");
            if (!isLoadMore) list.innerHTML = "";
            oldestMessageTimestamp = apiResponse.data[0].createdAt;

            const tempFragment = document.createDocumentFragment();
            apiResponse.data.forEach((msg) => {
              const div = document.createElement("div");
              div.className = "msg history";
              const timeStr = new Date(msg.createdAt).toLocaleTimeString();
              const isMyMsg = msg.senderId === currentUserId;
              const prefix = isMyMsg
                ? "[TÔI]"
                : `[User ${msg.senderId.substring(0, 5)}]`;

              div.innerHTML = `<strong>${prefix}</strong>: ${msg.content} <span class="time">(${timeStr})</span>`;

              // Nếu là tin của mình, hiển thị danh sách người đã xem từ mảng ReadBy của MongoDB
              if (isMyMsg) {
                let readText = "";
                if (msg.readBy && msg.readBy.length > 0) {
                  // Bỏ qua ID của chính mình nếu bị lọt vào
                  const viewers = msg.readBy
                    .filter((id) => id !== currentUserId)
                    .map((id) => id.substring(0, 5));
                  if (viewers.length > 0) {
                    readText = `👀 Đã xem bởi ${viewers.join(", ")}...`;
                  }
                }
                div.innerHTML += `<div class="read-receipt" style="font-size:0.75em; color:green; text-align:right;">${readText}</div>`;
              }

              tempFragment.appendChild(div);
            });

            if (isLoadMore) list.prepend(tempFragment);
            else {
              list.appendChild(tempFragment);
              document.getElementById("loadMoreBtn").style.display = "block";
              const chatBox = document.getElementById("chatBox");
              chatBox.scrollTop = chatBox.scrollHeight;
            }
            if (apiResponse.data.length < 5)
              document.getElementById("loadMoreBtn").style.display = "none";
          } else if (apiResponse.success && apiResponse.data.length === 0) {
            alert("Đã hết tin nhắn cũ!");
            document.getElementById("loadMoreBtn").style.display = "none";
          }
        } catch (err) {
          console.error("Lỗi lấy lịch sử:", err);
        }
      }

      async function loadMore() {
        await fetchHistory(true);
      }
    </script>
  </body>
</html>
